    baseUri: https://api.paystack.co
    description: Paystack Refunds and Disputes API business capability. Self-contained, no shared references.
    resources:
    - name: refund
      path: /refund
      operations:
      - name: refundcreate
        method: POST
        description: Paystack Create Refund
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body.
          required: true
      - name: refundlist
        method: GET
        description: Paystack List Refunds
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: refund
      path: /refund/{id}
      operations:
      - name: refundfetch
        method: GET
        description: Paystack Fetch Refund
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dispute
      path: /dispute
      operations:
      - name: disputelist
        method: GET
        description: Paystack List Disputes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

        description: Paystack Fetch Dispute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: disputeupdate
        method: PUT
        description: Paystack Update Dispute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:

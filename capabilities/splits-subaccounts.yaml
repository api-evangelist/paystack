    - name: split
      path: /split
      operations:
      - name: splitcreate
        method: POST
        description: Paystack Create Split
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body.
          required: true
      - name: splitlist
        method: GET
        description: Paystack List Splits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: split
